<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tabla de Vendedores de Automóviles</title>

    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tfoot {
            background-color: #27ae60;
            color: white;
            font-weight: bold;
        }

        .campeon {
            color: yellow;
        }
    </style>

</head>
<body>

    <table>
        <thead>
            <tr>
                <th colspan="6">TABLA DE VENDEDORES DE AUTOMÓVILES</th>
            </tr>
            <tr>
                <th>Región</th>
                <th>Vendedor</th>
                <th>Autos Vendidos</th>
                <th>Ingresos ($)</th>
                <th>Marca Principal</th>
                <th>Experiencia (años)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="2"><em>Norte</em></td>
                <td>Juan Pérez</td>
                <td>25</td>
                <td>50000</td>
                <td>Toyota</td>
                <td>5</td>
            </tr>
            <tr>
                <td>Ana Gómez</td>
                <td>30</td>
                <td>62000</td>
                <td>Chevrolet</td>
                <td>7</td>
            </tr>

            <tr>
                <td rowspan="2"><em>Sur</em></td>
                <td>Carlos Ruiz</td>
                <td>20</td>
                <td>45000</td>
                <td>Ford</td>
                <td>4</td>
            </tr>
            <tr>
                <td>María López</td>
                <td>35</td>
                <td>70000</td>
                <td>Nissan</td>
                <td>8</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">Total de Participantes: 4</td>
                <td colspan="3">CAMPEÓN: <span class="campeon">María López</span></td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
