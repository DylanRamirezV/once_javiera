<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Tarjeta de Perfil </title>
<link rel="stylesheet" href="style.css">

</head>
<body>
  
  <div class="tarjeta">
    
    <div class="perfil-header">
      <img src="https://i0.wp.com/codigoespagueti.com/wp-content/uploads/2021/06/Dragon-Ball_-Manga-nos-muestra-como-se-transformo-Gohan-del-futuro-en-super-saiyajin-por-primera-vez.jpg" alt="Avatar" class="avatar">
      <div class="nombre-usuario">
        <h2>Gohan Del Futuro ☑</h2>
        <span>@Gohan.dev</span>
      </div>
    </div>
    
    <p class="bio">
      Me gusta ayudar a la gente y pelear para tener un futuro increible.
      <br>
      💖
    </p>
    
    <div class="estadisticas">
      <div class="stat-item">
        <span class="stat-num">1K</span>
        <span class="stat-label">Proyectos</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">999.9M</span>
        <span class="stat-label">Seguidores</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">5</span>
        <span class="stat-label">Siguiendo</span>
      </div>
    </div>
    
    <div class="botones">
      <button class="btn btn-seguir">Seguir</button>
      <button class="btn btn-mensaje">Mensaje</button>
    </div>
    
    <div class="miniaturas">
      <img src="https://i.pinimg.com/736x/b9/8f/d0/b98fd0c8d096e2c06bdcbd03134c67ba.jpg" alt="P1" class="mini-img">
      <img src="https://i.pinimg.com/originals/51/f3/52/51f352b51a7e156c23398e34a9e83e2c.jpg" alt="P2" class="mini-img">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKq0Z-P6UsgPNTnmTLpeZoE8P_4UgSwvaQbQ&s" alt="P3" class="mini-img">
    </div>
    
  </div>

</body>
</html>
